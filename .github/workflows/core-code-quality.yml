name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Full Project Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full project quality check (type-check, format, lint)
        run: npm run quality:check

  summary:
    name: Add Results Summary
    runs-on: ubuntu-latest
    needs: [quality]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Add results to summary
        run: |
          echo "✅ Code Quality Check Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🛡️ Quality Gates: TypeScript check, Prettier check, ESLint" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ Check completed at: $(date)" >> $GITHUB_STEP_SUMMARY
